name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches:
      - main
      - develop
      - "feat/**"
      - "fix/**"
      - "chore/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: taller
          POSTGRES_PASSWORD: taller_dev
          POSTGRES_DB: taller_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build shared
        run: pnpm --filter @taller-saas/shared build

      - name: Generate Prisma Client
        run: pnpm --filter @taller-saas/api prisma:generate

      - name: Run Migrations
        run: pnpm --filter @taller-saas/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://taller:taller_dev@localhost:5432/taller_saas_test

      - name: Test API
        run: pnpm --filter @taller-saas/api test
        env:
          DATABASE_URL: postgresql://taller:taller_dev@localhost:5432/taller_saas_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret

      - name: Run E2E Tests
        run: pnpm --filter @taller-saas/api test:e2e
        env:
          DATABASE_URL: postgresql://taller_app:taller_app_dev@localhost:5432/taller_saas_test?schema=public
          DATABASE_URL_TEST: postgresql://taller_app:taller_app_dev@localhost:5432/taller_saas_test?schema=public
          DATABASE_URL_TEST_SEED: postgresql://taller:taller_dev@localhost:5432/taller_saas_test?schema=public
          JWT_SECRET: test-secret

      - name: Test Web
        run: pnpm --filter @taller-saas/web test

      - name: Build
        run: pnpm build
